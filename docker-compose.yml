version: "3.8"

# 掌柜智库 DualRAG 基础设施一键部署
# 使用方式：
#   1. 启动所有服务：docker compose up -d
#   2. 查看状态：   docker compose ps
#   3. 停止：      docker compose down
#   4. 清理数据：  docker compose down -v
#
# 启动后默认端口：
#   Milvus    19530
#   MinIO     9000 (Web 控制台 9001)
#   MongoDB   27017
#   etcd      2379 (Milvus 依赖，无需暴露)

services:
  # ============================================================
  # etcd —— Milvus 的元数据存储（Milvus 强依赖，必须先启动）
  # ============================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: dualrag-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # Milvus —— 向量数据库
  # 代码中 MILVUS_URL=http://localhost:19530
  # ============================================================
  milvus:
    image: milvusdb/milvus:v2.4.10
    container_name: dualrag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # MinIO —— 对象存储（图片持久化 + PDF 原文件）
  # 代码中 MINIO_ENDPOINT=127.0.0.1:9000
  # 账号 minioadmin / minioadmin（与 .env 一致）
  # 桶 knowledge-base-files 由代码自动创建
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: dualrag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # MongoDB —— 多轮对话历史存储
  # 代码中 MONGO_URL=mongodb://localhost:27017  MONGO_DB_NAME=xia
  # ============================================================
  mongodb:
    image: mongo:7.0
    container_name: dualrag-mongodb
    environment:
      MONGO_INITDB_DATABASE: xia
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  etcd_data:
  milvus_data:
  minio_data:
  mongo_data:
