<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>掌柜智库AI助手</title>
  <style>
    :root{
      --bg:#f3f5f7;
      --panel:#ffffff;
      --text:#1f2d3d;
      --muted:#7a869a;
      --brand:#7c3aed;
      --brand2:#2563eb;
      --bubble-user:#7c3aed;
      --bubble-bot:#ffffff;
      --border:#e6e9ef;
      --shadow:0 10px 30px rgba(31,45,61,.12);
      --tool-bg:#f8f7ff;
      --tool-border:#e0d8ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(124,58,237,.15), transparent 60%),
                  radial-gradient(1000px 500px at 90% 10%, rgba(37,99,235,.15), transparent 55%),
                  var(--bg);
      color:var(--text);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
    }
    .app{
      width:100%;
      max-width:980px;
      height:min(820px, 92vh);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 18px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(90deg, rgba(124,58,237,.10), rgba(37,99,235,.10));
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:240px;
    }
    .logo{
      width:36px;height:36px;border-radius:10px;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow:0 8px 18px rgba(124,58,237,.25);
    }
    .title{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }
    .title strong{font-size:14px}
    .title span{font-size:12px;color:var(--muted);margin-top:3px}
    .top-actions{
      margin-left:auto;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      background:#fff;
    }
    .btn{
      border:none;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      color:#fff;
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
      cursor:pointer;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}

    .chat{
      flex:1;
      overflow:auto;
      padding:16px 14px 10px;
      background:linear-gradient(180deg, rgba(124,58,237,.05), transparent 40%),
                 linear-gradient(0deg, rgba(37,99,235,.05), transparent 45%);
    }
    .dayline{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin:6px 0 14px;
    }
    .msg{
      display:flex;
      gap:10px;
      margin:10px 0;
      align-items:flex-end;
    }
    .msg.user{justify-content:flex-end}
    .msg > div:not(.avatar){
      flex:1;
      min-width:0;
    }
    .msg.user > div:not(.avatar){
      display:flex;
      flex-direction:column;
      align-items:flex-end;
    }
    .avatar{
      width:34px;height:34px;border-radius:10px;
      background:#e9eef7;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;
      color:#3b4a5a;
      flex:0 0 auto;
    }
    .avatar.bot{background:linear-gradient(135deg, rgba(124,58,237,.18), rgba(37,99,235,.18))}
    .bubble{
      max-width:min(720px, 76%);
      display:inline-block;
      border-radius:14px;
      padding:10px 12px;
      border:1px solid var(--border);
      background:var(--bubble-bot);
      position:relative;
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      overflow-wrap: break-word;
    }
    .msg.user .bubble{
      background:var(--bubble-user);
      color:#fff;
      border-color:transparent;
    }
    .meta{
      font-size:11px;
      color:var(--muted);
      margin-top:6px;
    }
    .msg.user .meta{color:rgba(255,255,255,.85)}

    /* Agent 调用链 - 极简紧凑 */
    .agent-chain{
      margin-top:4px;
      display:flex;
      flex-wrap:wrap;
      gap:4px;
    }
    .agent-chip{
      display:inline-flex;
      align-items:center;
      gap:3px;
      font-size:10px;
      padding:1px 6px;
      border-radius:999px;
      background:var(--tool-bg);
      border:1px solid var(--tool-border);
      color:var(--brand);
      cursor:pointer;
      user-select:none;
    }
    .agent-chip:hover{background:rgba(124,58,237,.12)}
    .agent-chip .step-num{
      font-weight:700;
      color:var(--brand2);
      font-size:9px;
    }
    .agent-tooltip{
      display:none;
      position:fixed;
      z-index:999;
      background:#fff;
      border:1px solid var(--border);
      border-radius:8px;
      padding:8px 10px;
      box-shadow:0 8px 24px rgba(31,45,61,.18);
      max-width:400px;
      font-size:11px;
      line-height:1.5;
      white-space:pre-wrap;
      overflow-wrap:break-word;
      max-height:300px;
      overflow:auto;
    }
    .agent-tooltip.visible{display:block}
    .agent-tooltip .tt-label{font-weight:600;color:var(--brand);margin-bottom:2px}
    .agent-tooltip .tt-content{font-family:ui-monospace,monospace;font-size:10px;color:var(--text)}

    details.progress{
      margin-top:8px;
      border:1px dashed rgba(122,134,154,.45);
      border-radius:12px;
      padding:8px 10px;
      background:rgba(122,134,154,.06);
    }
    details.progress summary{
      cursor:pointer;
      user-select:none;
      color:var(--muted);
      font-size:12px;
    }
    .progress ul{margin:8px 0 0 18px;padding:0}
    .progress li{margin:4px 0;font-size:12px;color:#56657a}
    details.eval-score{
      margin-top:6px;
      border:1px solid rgba(124,58,237,.25);
      border-radius:12px;
      padding:6px 10px;
      background:rgba(124,58,237,.04);
    }
    details.eval-score summary{
      cursor:pointer;
      user-select:none;
      color:var(--brand);
      font-size:12px;
    }
    .eval-score ul{margin:6px 0 0 14px;padding:0}
    .eval-score li{margin:3px 0;font-size:12px}
    .eval-score .good{color:#22a67e}
    .eval-score .fair{color:#d9a300}
    .eval-score .poor{color:#d9534f}

    .answer-images{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .answer-images img{
      display: block;
      max-width: min(100%, 600px);
      max-height: 600px;
      width: auto;
      height: auto;
      border-radius:12px;
      border:1px solid var(--border);
      box-shadow:0 10px 24px rgba(31,45,61,.10);
      background:#fff;
    }
    .answer-images a{
      font-size:12px;
      color:var(--muted);
      text-decoration:none;
      word-break:break-all;
    }

    .typing{
      display:inline-flex;gap:6px;align-items:center;
    }
    .dot{
      width:7px;height:7px;border-radius:50%;
      background:#9aa6b2;
      animation:bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2){animation-delay:.15s}
    .dot:nth-child(3){animation-delay:.3s}
    @keyframes bounce{
      0%,80%,100%{transform:translateY(0);opacity:.6}
      40%{transform:translateY(-5px);opacity:1}
    }

    .composer{
      border-top:1px solid var(--border);
      padding:12px 14px;
      display:flex;
      gap:10px;
      align-items:flex-end;
      background:#fff;
    }
    textarea{
      flex:1;
      resize:none;
      min-height:44px;
      max-height:140px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      outline:none;
      font-size:14px;
      line-height:1.5;
    }
    textarea:focus{border-color:rgba(124,58,237,.6); box-shadow:0 0 0 3px rgba(124,58,237,.12)}
    .send{
      width:88px;
      height:44px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      color:#fff;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
    }
    .send:disabled{opacity:.6;cursor:not-allowed}
    .hint{
      padding:0 14px 12px;
      color:var(--muted);
      font-size:12px;
      background:#fff;
    }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      border:1px solid var(--border);
      padding:1px 6px;
      border-radius:6px;
      background:#f7f9fc;
      color:#3b4a5a;
    }
    .nav-links{
      display:flex;
      gap:8px;
      align-items:center;
      padding:6px 14px;
      border-top:1px solid var(--border);
      background:#fafbfc;
      font-size:11px;
    }
    .nav-links a{
      color:var(--muted);
      text-decoration:none;
      padding:2px 8px;
      border-radius:6px;
      transition:.15s;
    }
    .nav-links a:hover{background:rgba(124,58,237,.08);color:var(--brand)}
    .nav-links .sep{color:var(--border);font-size:10px}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <strong>掌柜智库AI助手</strong>
          <span id="subTitle">Agent 驱动 · 自主搜索推理</span>
        </div>
      </div>
      <div class="top-actions">
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;color:var(--muted);margin-right:10px;">
          <input type="checkbox" id="streamToggle" checked> 流式输出
        </label>
        <span class="pill" id="apiPill">API: 未连接</span>
        <button class="btn" id="btnClear">清空对话</button>
      </div>
    </div>

    <div class="chat" id="chat">
      <div class="dayline">今天</div>
      <div class="msg bot">
        <div class="avatar bot">AI</div>
        <div>
          <div class="bubble">你好，我是掌柜智库AI助手。我会自主调用工具（知识库搜索、联网搜索等）来回答你的问题，并在下方展示思考过程。</div>
          <div class="meta">提示：可以问"有哪些摄像头产品？"</div>
        </div>
      </div>
    </div>

    <div class="composer">
      <textarea id="input" placeholder="请输入问题（Enter 发送，Shift+Enter 换行）"></textarea>
      <button class="send" id="send">发送</button>
    </div>
    <div class="hint">快捷键：<span class="kbd">Enter</span> 发送，<span class="kbd">Shift</span>+<span class="kbd">Enter</span> 换行</div>
    <div class="nav-links">
      <span style="color:var(--muted)">🌐</span>
      <a href="http://127.0.0.1:8000/import.html" target="_blank">📄 PDF上传</a>
      <span class="sep">|</span>
      <a href="http://127.0.0.1:8001/chat.html" target="_blank">🔍 传统RAG</a>
      <span class="sep">|</span>
      <a href="http://127.0.0.1:8002/chat.html" target="_blank">🤖 AI流程助手</a>
    </div>
  </div>

  <script>
    const API_BASE = `${location.protocol}//${location.host}`.includes('http') ? `${location.protocol}//${location.host}` : 'http://127.0.0.1:8002';
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const apiPill = document.getElementById('apiPill');
    const btnClear = document.getElementById('btnClear');
    const streamToggle = document.getElementById('streamToggle');

    let sessionId = localStorage.getItem('agent_session_id');
    if (!sessionId) {
      sessionId = 'agent-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('agent_session_id', sessionId);
    }

    function scrollToBottom(){
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function nowTime(){
      const d = new Date();
      return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    }
    function formatTime(ts){
      if(!ts) return nowTime();
      const d = new Date(Number(ts) * 1000);
      if(Number.isNaN(d.getTime())) return nowTime();
      return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    }
    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function isImageUrl(url){
      try {
        const u = new URL(url);
        return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(u.pathname);
      } catch (e) {
        return /\.(png|jpe?g|gif|webp|bmp|svg)(\?|#|$)/i.test(url || '');
      }
    }

    function normalizeUrl(rawUrl){
      const s = String(rawUrl || '').trim();
      if(!s) return '';
      return s.replace(/\s/g, '%20');
    }

    function dedupeKeepOrder(arr){
      const seen = new Set();
      const out = [];
      for(const x of (Array.isArray(arr) ? arr : [])){
        const v = String(x || '');
        if(!v) continue;
        if(seen.has(v)) continue;
        seen.add(v);
        out.push(v);
      }
      return out;
    }

    function extractUrlsLoose(text){
      const s = String(text || '');
      const regex = /(https?:\/\/[^\s]+)/g;
      const matches = s.match(regex) || [];
      const urls = [];
      const trimTailPunct = (u) => String(u || '').replace(/[)\]}'">，。,;；\]】）＞]+$/g, '');
      const trimHeadPunct = (u) => String(u || '').replace(/^[<([{'"]+|^[＜（【\[]+/g, '');
      for(const m of matches){
        let u = trimHeadPunct(trimTailPunct(m));
        if(u) urls.push(u);
      }
      return dedupeKeepOrder(urls);
    }

    function parseImagesFromTextLoosely(text){
      const urls = extractUrlsLoose(text).filter(isImageUrl);
      return dedupeKeepOrder(urls);
    }

    function findLastImageMarkerIndex(raw){
      const s = String(raw || '');
      const re = /【\s*图片\s*】|\[\s*图片\s*\]/g;
      let m;
      let lastIdx = -1;
      let lastLen = 0;
      while((m = re.exec(s)) !== null){
        lastIdx = m.index;
        lastLen = m[0].length;
      }
      return { idx: lastIdx, len: lastLen };
    }

    function parseAnswerAndImages(text){
      const raw = String(text || '');
      const { idx, len } = findLastImageMarkerIndex(raw);
      if(idx === -1) return { text: raw, images: [] };
      const before = raw.slice(0, idx).trimEnd();
      const after = raw.slice(idx + len).trim();
      const urls = [];
      const lines = after.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      for(const line of lines){
        if(line.startsWith('http://') || line.startsWith('https://')){
          urls.push(line);
        }else{
          const matches = extractUrlsLoose(line);
          for(const u of matches){
            urls.push(u);
          }
        }
      }
      const seen = new Set();
      const images = [];
      for(const u of urls){
        const normalized = normalizeUrl(u);
        if(!isImageUrl(normalized)) continue;
        if(seen.has(normalized)) continue;
        seen.add(normalized);
        images.push(normalized);
      }
      return { text: before, images };
    }

    function renderAnswerWithImages(containerEl, answerText, candidateImageUrls){
      const { text, images: imagesFromBlock } = parseAnswerAndImages(answerText);
      const candidates = Array.isArray(candidateImageUrls)
        ? candidateImageUrls.map(normalizeUrl).filter(isImageUrl)
        : [];
      const looseImages = extractUrlsLoose(answerText).map(normalizeUrl).filter(isImageUrl);
      const shouldShow = (imagesFromBlock && imagesFromBlock.length > 0) || (candidates.length > 0) || (looseImages.length > 0);
      const allImages = new Set([
          ...(imagesFromBlock && imagesFromBlock.length > 0 ? imagesFromBlock : []),
          ...candidates,
          ...looseImages
      ]);
      const images = Array.from(allImages);

      containerEl.textContent = '';
      if((text || '').trim().length > 0){
        const textEl = document.createElement('div');
        textEl.className = 'answer-text';
        textEl.textContent = text;
        containerEl.appendChild(textEl);
      }else{
        const textEl = document.createElement('div');
        textEl.className = 'answer-text';
        textEl.textContent = '（已完成，但未返回答案）';
        containerEl.appendChild(textEl);
      }
      if(images && images.length > 0){
        const imgWrap = document.createElement('div');
        imgWrap.className = 'answer-images';
        for(const url of images){
          const safeUrl = normalizeUrl(url);
          const img = document.createElement('img');
          img.loading = 'lazy';
          img.src = safeUrl;
          img.alt = '参考图片';
          img.referrerPolicy = 'no-referrer';
          img.addEventListener('error', () => { img.style.display = 'none'; });
          imgWrap.appendChild(img);
          const link = document.createElement('a');
          link.href = safeUrl;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = url;
          imgWrap.appendChild(link);
        }
        containerEl.appendChild(imgWrap);
      }
    }

    function renderAgentChain(container, chain){
      if(!chain || !Array.isArray(chain) || chain.length === 0) return;
      const toolNames = {
        identify_item_names: '识别商品名称',
        search_knowledge_base: '知识库搜索',
        search_knowledge_base_enhanced: '增强知识库搜索(HyDE)',
        search_web: '联网搜索'
      };
      const html = `
        <details class="agent-chain" open>
          <summary>🤖 Agent 思考过程（${chain.length} 步）</summary>
          ${chain.map((step, i) => `
            <div class="chain-step">
              <div class="tool-name">${toolNames[step.tool] || step.tool}</div>
              <details>
                <summary>查看输入 / 输出</summary>
                <div class="io-content"><b>输入:</b> ${escapeHtml(JSON.stringify(step.input, null, 2))}</div>
                ${step.output !== null && step.output !== undefined ? `
                <div class="io-content" style="margin-top:4px;"><b>输出:</b> ${escapeHtml(String(step.output).slice(0, 500))}</div>
                ` : ''}
              </details>
            </div>
          `).join('')}
        </details>
      `;
      container.insertAdjacentHTML('beforeend', html);
    }

    function addUserMsg(text){
      const html = `
        <div class="msg user">
          <div>
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="meta">${nowTime()}</div>
          </div>
          <div class="avatar">我</div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    function addUserMsgWithTime(text, ts){
      const html = `
        <div class="msg user">
          <div>
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="meta">${formatTime(ts)}</div>
          </div>
          <div class="avatar">我</div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    function addBotMsgWithTime(text, ts, imageUrls, ragScores, agentChain){
      const id = 'bot-his-' + Math.random().toString(36).slice(2);
      const html = `
        <div class="msg bot" id="${id}">
          <div class="avatar bot">AI</div>
          <div>
            <div class="bubble"><div class="answer"></div></div>
            <div class="meta">${formatTime(ts)}</div>
          </div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      const el = document.getElementById(id);
      if(el){
        const answerEl = el.querySelector('.answer');
        renderAnswerWithImages(answerEl, text || '', imageUrls || []);
        renderEvalScores(answerEl.parentElement, ragScores);
        renderAgentChain(answerEl.parentElement, agentChain);
      }
      scrollToBottom();
      return el;
    }

    function addBotMsgSkeleton(){
      const id = 'bot-' + Math.random().toString(36).slice(2);
      const html = `
        <div class="msg bot" id="${id}">
          <div class="avatar bot">AI</div>
          <div style="min-width: 180px;">
            <div class="bubble">
              <span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
              <span style="font-size:12px;color:var(--muted);margin-left:4px;">AI 思考中...</span>
            </div>
            <div class="meta">${nowTime()}</div>
          </div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
      return document.getElementById(id);
    }

    function renderAgentChain(container, chain){
      if(!chain || !Array.isArray(chain) || chain.length === 0) return;
    const toolNames = {
        topic_identification: '主题识别',
        search_knowledge_base: '知识库',
        search_knowledge_base_enhanced: 'HyDE搜索',
        search_web: '联网'
    };
      // remove old tooltip if any
      const oldTip = document.getElementById('agent-tooltip-global');
      if(oldTip) oldTip.remove();
      // create tooltip
      const tip = document.createElement('div');
      tip.id = 'agent-tooltip-global';
      tip.className = 'agent-tooltip';
      document.body.appendChild(tip);
      const wrap = document.createElement('div');
      wrap.className = 'agent-chain';
      chain.forEach((step, i) => {
        const chip = document.createElement('span');
        chip.className = 'agent-chip';
        chip.innerHTML = `<span class="step-num">#${i+1}</span> ${toolNames[step.tool] || step.tool}`;
        chip.addEventListener('mouseenter', (e) => {
          const inp = escapeHtml(JSON.stringify(step.input, null, 2));
          const out = step.output ? escapeHtml(String(step.output).slice(0, 300)) : '(empty)';
          tip.innerHTML = `<div class="tt-label">⚡ ${toolNames[step.tool] || step.tool}</div>` +
            `<div class="tt-label" style="font-size:10px;color:var(--muted);margin-top:4px;">输入</div>` +
            `<div class="tt-content">${inp}</div>` +
            `<div class="tt-label" style="font-size:10px;color:var(--muted);margin-top:4px;">输出</div>` +
            `<div class="tt-content">${out}</div>`;
          const rect = chip.getBoundingClientRect();
          tip.style.left = Math.min(rect.left, window.innerWidth - 420) + 'px';
          tip.style.top = (rect.bottom + 4) + 'px';
          tip.classList.add('visible');
        });
        chip.addEventListener('mouseleave', () => { tip.classList.remove('visible'); });
        wrap.appendChild(chip);
      });
      container.appendChild(wrap);
    }

    function renderEvalScores(container, scores){
      if(!scores) return;
      const names = {
        faithfulness: 'Faithfulness（忠实度）',
        answer_relevancy: 'Answer Relevancy（答案相关性）',
        context_precision: 'Context Precision（上下文精确度）'
      };
      const cls = (v) => {
        const n = Number(v);
        if(n >= 0.8) return 'good';
        if(n >= 0.5) return 'fair';
        return 'poor';
      };
      const html = `
        <details class="eval-score" open>
          <summary>📊 RAG 评估分数</summary>
          <ul>${Object.keys(names).map(k => {
            const v = scores[k];
            return `<li><span class="${cls(v)}">${names[k]}: ${(Number(v)*100).toFixed(1)}%</span></li>`;
          }).join('')}</ul>
        </details>
      `;
      container.insertAdjacentHTML('beforeend', html);
    }

    function finalizeBotAnswer(botMsgEl, answer, error, imageUrls, ragScores, agentChain){
      const bubble = botMsgEl.querySelector('.bubble');
      const err = (error || '').trim();
      bubble.textContent = '';
      if(err){
        const errEl = document.createElement('div');
        errEl.className = 'answer';
        errEl.textContent = `抱歉，本次处理失败：\n${err}`;
        bubble.appendChild(errEl);
        return;
      }
      const answerEl = document.createElement('div');
      answerEl.className = 'answer';
      bubble.appendChild(answerEl);
      renderAnswerWithImages(answerEl, answer || '', imageUrls || []);
      renderEvalScores(bubble, ragScores);
      renderAgentChain(bubble, agentChain);
    }

    async function apiHealth(){
      try{
        const res = await fetch(`${API_BASE}/health`);
        if(!res.ok) throw new Error('health not ok');
        apiPill.textContent = `API: 已连接`;
      }catch(e){
        apiPill.textContent = `API: 未连接`;
      }
    }

    async function loadHistory(){
      try{
        const res = await fetch(`${API_BASE}/history/${sessionId}`);
        if(!res.ok) return;
        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];
        if(items.length === 0) return;
        const nodes = Array.from(chatEl.querySelectorAll('.msg'));
        for(let i=1;i<nodes.length;i++) nodes[i].remove();

        const evalRe = /^\[RAG评估\]\s*/;
        let pendingBotEl = null;
        for(const item of items){
          if(item.role === 'user'){
            addUserMsgWithTime(item.text || '', item.ts);
            pendingBotEl = null;
          }else if(item.role === 'system' && evalRe.test(item.text || '')){
            try{
              const jsonStr = (item.text || '').replace(evalRe, '');
              const scores = JSON.parse(jsonStr);
              if(pendingBotEl){
                renderEvalScores(pendingBotEl.querySelector('.bubble'), scores);
              }
            }catch(_){}
          }else{
            const msgEl = addBotMsgWithTime(item.text || '', item.ts, item.image_urls || []);
            pendingBotEl = msgEl;
          }
        }
        scrollToBottom();
      }catch(_){}
    }

    async function submitQuery(text){
      const isStream = streamToggle.checked;
      const res = await fetch(`${API_BASE}/query`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          query: text,
          session_id: sessionId,
          is_stream: isStream
        })
      });
      if(!res.ok){
        const msg = await res.text();
        throw new Error(msg || '请求失败');
      }
      return await res.json();
    }

    async function onSend(){
      const text = (inputEl.value || '').trim();
      if(!text) return;
      inputEl.value = '';
      addUserMsg(text);
      const botMsgEl = addBotMsgSkeleton();
      sendBtn.disabled = true;

      try{
        const isStream = streamToggle.checked;
        const data = await submitQuery(text);

        if (!isStream) {
          finalizeBotAnswer(botMsgEl, data.answer, data.error, data.image_urls || [], data.rag_scores, data.agent_chain);
          sendBtn.disabled = false;
          return;
        }

        const { session_id } = data;
        const bubble = botMsgEl.querySelector('.bubble');
        let answerEl = bubble.querySelector('.answer');
        if(!answerEl){
          answerEl = document.createElement('div');
          answerEl.className = 'answer';
          bubble.insertBefore(answerEl, bubble.firstChild);
        }

        const es = new EventSource(`${API_BASE}/stream/${session_id}`);
        let rawAnswerText = '';

        es.addEventListener('delta', (e) => {
          try{
            const d = JSON.parse(e.data || '{}');
            const delta = d.delta || '';
            if(delta){
              rawAnswerText += delta;
              renderAnswerWithImages(answerEl, rawAnswerText, []);
              scrollToBottom();
            }
          }catch(_){}
        });

        es.addEventListener('final', (e) => {
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();
          try{
            const d = JSON.parse(e.data || '{}');
            const finalText = (d && typeof d.answer === 'string' && d.answer.trim().length > 0)
              ? d.answer : (rawAnswerText || answerEl.textContent || '');
            renderAnswerWithImages(answerEl, finalText, d.image_urls || []);
            renderEvalScores(bubble, d.rag_scores);
            renderAgentChain(bubble, d.agent_chain);
          }catch(_){}
          es.close();
          sendBtn.disabled = false;
        });

        es.addEventListener('error', (e) => {
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();
          try{
            const msg = e && e.data ? (JSON.parse(e.data).error || 'SSE 连接中断/失败') : 'SSE 连接中断/失败';
            rawAnswerText += `\n\n（错误：${msg}）`;
            renderAnswerWithImages(answerEl, rawAnswerText, []);
          }catch(_){
            rawAnswerText += `\n\n（错误：SSE 连接中断/失败）`;
            renderAnswerWithImages(answerEl, rawAnswerText, []);
          }
          es.close();
          sendBtn.disabled = false;
        });
      }catch(e){
        const bubble = botMsgEl.querySelector('.bubble');
        const typing = botMsgEl.querySelector('.typing');
        if(typing) typing.remove();
        bubble.textContent = `请求失败：${e.message || e}`;
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', onSend);
    inputEl.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        onSend();
      }
    });
    btnClear.addEventListener('click', async () => {
      if(!confirm('确定要清空当前会话的历史记录吗？这将无法恢复。')) return;
      try {
        const res = await fetch(`${API_BASE}/history/${sessionId}`, { method: 'DELETE' });
        if(!res.ok) {
           console.error("Failed to clear history backend, status:", res.status);
           alert('服务端清空失败，仅清空本地显示');
        }
      } catch(e) {
        console.error("Failed to clear history backend", e);
        alert('服务端清空失败，仅清空本地显示');
      }
      const nodes = Array.from(chatEl.querySelectorAll('.msg'));
      for(let i=1;i<nodes.length;i++) nodes[i].remove();
      scrollToBottom();
    });

    apiHealth();
    setInterval(apiHealth, 5000);
    loadHistory();
    setTimeout(() => inputEl.focus(), 200);
  </script>
</body>
</html>
